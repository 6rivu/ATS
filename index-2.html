<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Integer Adventures 🚀</title>

<!-- React 18 + Babel (no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<!-- Fonts: Nunito (body) + Fredoka One (headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  background: #0A0F1E;
  color: #F0F4FF;
  font-family: 'Nunito', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

#root {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════════
   CSS CUSTOM PROPERTIES
═══════════════════════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:        #0A0F1E;
  --bg2:       #0D1526;
  --card:      #111827;
  --card2:     #1A2235;
  --card3:     #1E2B40;

  /* Borders */
  --border:    #2A3A55;
  --border2:   #3B4E6A;

  /* Text */
  --text:      #F0F4FF;
  --text2:     #C0D0EF;
  --muted:     #7A8FAF;
  --faint:     #3B4A6B;

  /* Brand colours */
  --purple:    #6366F1;
  --purple2:   #818CF8;
  --purple3:   #A78BFA;
  --teal:      #14B8A6;
  --teal2:     #2DD4BF;
  --blue:      #3B82F6;
  --blue2:     #60A5FA;
  --amber:     #F59E0B;
  --amber2:    #FCD34D;
  --green:     #22C55E;
  --green2:    #4ADE80;
  --coral:     #F87171;
  --coral2:    #FCA5A5;
  --pink:      #EC4899;
  --gold:      #FBBF24;

  /* Subtopic colours */
  --st1: #14B8A6;
  --st2: #3B82F6;
  --st3: #F59E0B;
  --st4: #22C55E;
  --st5: #F87171;

  /* Spacing */
  --gap-xs:  4px;
  --gap-sm:  8px;
  --gap-md:  16px;
  --gap-lg:  24px;
  --gap-xl:  40px;

  /* Radii */
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  24px;
  --r-pill: 999px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);

  /* Transitions */
  --t-fast: 0.15s ease;
  --t-mid:  0.25s ease;
  --t-slow: 0.4s ease;
}

/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY HELPERS
═══════════════════════════════════════════════════════════ */
.fredoka {
  font-family: 'Fredoka One', cursive;
  font-weight: 400;
  letter-spacing: 0.3px;
}

.text-muted  { color: var(--muted); }
.text-faint  { color: var(--faint); }
.text-sm     { font-size: 0.85rem; }
.text-xs     { font-size: 0.75rem; }
.text-lg     { font-size: 1.15rem; }
.text-xl     { font-size: 1.4rem; }
.fw-bold     { font-weight: 700; }
.fw-black    { font-weight: 900; }
.lh-loose    { line-height: 1.8; }
.lh-relaxed  { line-height: 1.65; }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0);    }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0);     }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0);    }
  40%       { transform: translateY(-10px); }
  70%       { transform: translateY(-4px);  }
}

@keyframes bounceSpin {
  0%   { transform: scale(1) rotate(0deg);   }
  30%  { transform: scale(1.3) rotate(15deg); }
  60%  { transform: scale(1.1) rotate(-10deg); }
  100% { transform: scale(1) rotate(0deg);   }
}

@keyframes shake {
  0%, 100% { transform: translateX(0);  }
  20%, 60%  { transform: translateX(-6px); }
  40%, 80%  { transform: translateX(6px);  }
}

@keyframes popIn {
  0%   { transform: scale(0.6); opacity: 0; }
  70%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: 1;   }
  50%       { opacity: 0.5; }
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);    opacity: 1; }
  100% { transform: translateY(360px)  rotate(720deg); opacity: 0; }
}

@keyframes starPop {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.4) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg);   opacity: 1; }
}

@keyframes progressFill {
  from { width: 0%; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px  rgba(99,102,241,0.4); }
  50%       { box-shadow: 0 0 24px rgba(99,102,241,0.8); }
}

/* Animation utility classes */
.anim-fadeup   { animation: fadeUp 0.35s ease both; }
.anim-fadein   { animation: fadeIn 0.3s ease both; }
.anim-bounce   { animation: bounce 0.5s ease; }
.anim-shake    { animation: shake 0.4s ease; }
.anim-popin    { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
.anim-star     { animation: starPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
.anim-pulse    { animation: pulse 2s ease-in-out infinite; }
.anim-glow     { animation: glow 2s ease-in-out infinite; }

/* Staggered animation delays for lists */
.anim-delay-1 { animation-delay: 0.05s; }
.anim-delay-2 { animation-delay: 0.10s; }
.anim-delay-3 { animation-delay: 0.15s; }
.anim-delay-4 { animation-delay: 0.20s; }
.anim-delay-5 { animation-delay: 0.25s; }

/* ═══════════════════════════════════════════════════════════
   LAYOUT UTILITIES
═══════════════════════════════════════════════════════════ */
.flex        { display: flex; }
.flex-col    { display: flex; flex-direction: column; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-between{ display: flex; align-items: center; justify-content: space-between; }
.flex-wrap   { flex-wrap: wrap; }
.flex-1      { flex: 1; }
.gap-sm      { gap: var(--gap-sm); }
.gap-md      { gap: var(--gap-md); }
.gap-lg      { gap: var(--gap-lg); }
.w-full      { width: 100%; }
.text-center { text-align: center; }
.text-right  { text-align: right; }

/* Page centring wrapper */
.page-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 20px;
  width: 100%;
}

/* ═══════════════════════════════════════════════════════════
   CARD COMPONENTS
═══════════════════════════════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--gap-lg);
  position: relative;
}

.card-sm {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--gap-md);
}

.card-inset {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 16px;
}

/* Coloured left-accent card */
.card-accent {
  border-left-width: 3px;
  border-left-style: solid;
}

/* Story card gradient variant */
.card-story {
  background: linear-gradient(135deg, rgba(99,102,241,0.10), rgba(99,102,241,0.04));
  border: 1.5px solid rgba(99,102,241,0.25);
  border-radius: var(--r-xl);
  padding: 28px;
}

/* Answer-reveal card */
.card-correct {
  background: rgba(34,197,94,0.08);
  border: 1.5px solid rgba(34,197,94,0.45);
  border-radius: var(--r-md);
  padding: var(--gap-md);
}

.card-wrong {
  background: rgba(248,113,113,0.08);
  border: 1.5px solid rgba(248,113,113,0.45);
  border-radius: var(--r-md);
  padding: var(--gap-md);
}

/* ═══════════════════════════════════════════════════════════
   PILL / BADGE COMPONENTS
═══════════════════════════════════════════════════════════ */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: var(--r-pill);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.pill-outline {
  background: transparent;
  border: 1.5px solid var(--border2);
  color: var(--muted);
}

.pill-purple {
  background: rgba(99,102,241,0.18);
  color: var(--purple2);
}

.pill-teal {
  background: rgba(20,184,166,0.18);
  color: var(--teal2);
}

.pill-amber {
  background: rgba(245,158,11,0.18);
  color: var(--amber2);
}

.pill-green {
  background: rgba(34,197,94,0.18);
  color: var(--green2);
}

.pill-coral {
  background: rgba(248,113,113,0.18);
  color: var(--coral2);
}

/* Tier badge */
.tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  font-size: 0.76rem;
  font-weight: 700;
  background: rgba(245,158,11,0.15);
  color: var(--amber2);
  border: 1px solid rgba(245,158,11,0.30);
}

/* ═══════════════════════════════════════════════════════════
   BUTTON COMPONENTS
═══════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 24px;
  border-radius: var(--r-pill);
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
  border: none;
  transition: transform var(--t-fast), filter var(--t-fast), box-shadow var(--t-fast);
  letter-spacing: 0.2px;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  text-decoration: none;
}

.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  filter: brightness(1.12);
}

.btn:active:not(:disabled) {
  transform: translateY(0);
  filter: brightness(0.95);
}

.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  filter: grayscale(0.4);
}

/* Primary (purple gradient) */
.btn-primary {
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  color: #fff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.4);
}

.btn-primary:hover:not(:disabled) {
  box-shadow: 0 6px 24px rgba(99,102,241,0.6);
}

/* Green */
.btn-green {
  background: linear-gradient(135deg, #059669, #22C55E);
  color: #fff;
  box-shadow: 0 4px 14px rgba(34,197,94,0.35);
}

/* Amber */
.btn-amber {
  background: linear-gradient(135deg, #D97706, #F59E0B);
  color: #fff;
  box-shadow: 0 4px 14px rgba(245,158,11,0.35);
}

/* Teal */
.btn-teal {
  background: linear-gradient(135deg, #0D9488, #14B8A6);
  color: #fff;
  box-shadow: 0 4px 14px rgba(20,184,166,0.35);
}

/* Coral */
.btn-coral {
  background: linear-gradient(135deg, #DC2626, #F87171);
  color: #fff;
  box-shadow: 0 4px 14px rgba(248,113,113,0.35);
}

/* Ghost / outline */
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
}

.btn-ghost:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--border2);
  background: var(--card2);
  transform: translateY(-1px);
  filter: none;
}

/* Small variant */
.btn-sm {
  padding: 7px 16px;
  font-size: 0.85rem;
}

/* Large variant */
.btn-lg {
  padding: 15px 36px;
  font-size: 1.05rem;
  letter-spacing: 0.4px;
}

/* ═══════════════════════════════════════════════════════════
   PROGRESS / BKT BAR
═══════════════════════════════════════════════════════════ */
.progress-wrap {
  height: 8px;
  background: var(--card2);
  border-radius: var(--r-pill);
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  border-radius: var(--r-pill);
  transition: width 0.6s cubic-bezier(0.34,1.0,0.64,1);
}

.progress-fill-purple { background: linear-gradient(90deg, var(--purple), var(--purple3)); }
.progress-fill-green  { background: linear-gradient(90deg, #059669, var(--green)); }
.progress-fill-amber  { background: linear-gradient(90deg, #D97706, var(--amber)); }
.progress-fill-teal   { background: linear-gradient(90deg, #0D9488, var(--teal)); }
.progress-fill-coral  { background: linear-gradient(90deg, #DC2626, var(--coral)); }

/* Mini BKT bar used inside concept cards */
.bkt-bar {
  height: 5px;
  background: var(--bg);
  border-radius: var(--r-pill);
  overflow: hidden;
}

.bkt-bar-fill {
  height: 100%;
  border-radius: var(--r-pill);
  transition: width 0.7s cubic-bezier(0.34,1.2,0.64,1);
}

/* ═══════════════════════════════════════════════════════════
   OPTION BUTTONS (MCQ)
═══════════════════════════════════════════════════════════ */
.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 16px;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.98rem;
  color: var(--text2);
  text-align: left;
  transition: all var(--t-fast);
  font-weight: 600;
}

.option-btn:hover:not(.answered) {
  border-color: var(--border2);
  background: var(--card3);
  transform: translateX(3px);
}

.option-btn.selected {
  border-color: var(--purple2);
  background: rgba(99,102,241,0.12);
  color: var(--text);
}

.option-btn.correct {
  border-color: var(--green);
  background: rgba(34,197,94,0.10);
  color: var(--green2);
  animation: bounce 0.4s ease;
}

.option-btn.wrong {
  border-color: var(--coral);
  background: rgba(248,113,113,0.10);
  color: var(--coral2);
  animation: shake 0.4s ease;
}

/* Radio circle inside option */
.option-radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--t-fast);
}

.option-btn.selected  .option-radio { border-color: var(--purple2); background: var(--purple); }
.option-btn.correct   .option-radio { border-color: var(--green);  background: var(--green);  }
.option-btn.wrong     .option-radio { border-color: var(--coral);  background: var(--coral);  }

.option-radio-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
}

/* ═══════════════════════════════════════════════════════════
   HINT SYSTEM STYLES
═══════════════════════════════════════════════════════════ */
.hint-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--r-md);
  background: var(--card2);
  border: 1px solid var(--border);
  animation: slideDown 0.3s ease both;
}

.hint-number {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 800;
  flex-shrink: 0;
  color: #fff;
}

/* Hint level colours */
.hint-1 { background: var(--teal); }
.hint-2 { background: var(--amber); }
.hint-3 { background: var(--purple); }
.hint-4 { background: var(--coral); }

/* Hint progress dots */
.hint-dots {
  display: flex;
  gap: 5px;
  align-items: center;
}

.hint-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: background var(--t-mid);
}

.hint-dot.active { background: var(--amber); }

/* ═══════════════════════════════════════════════════════════
   STEP INDICATOR (phases in lesson)
═══════════════════════════════════════════════════════════ */
.phase-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: all var(--t-mid);
  background: var(--card2);
  flex-shrink: 0;
}

.phase-dot.done    { background: rgba(34,197,94,0.2);  border-color: var(--green); }
.phase-dot.current { border-width: 2px; }
.phase-dot.locked  { opacity: 0.4; }

/* ═══════════════════════════════════════════════════════════
   CONCEPT CARD (map grid)
═══════════════════════════════════════════════════════════ */
.concept-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px;
  cursor: pointer;
  text-align: left;
  transition: all var(--t-mid);
  position: relative;
  overflow: hidden;
  width: 100%;
  font-family: 'Nunito', sans-serif;
}

.concept-card:hover:not(.locked) {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}

.concept-card.locked {
  opacity: 0.45;
  cursor: not-allowed;
  filter: grayscale(0.5);
}

.concept-card.mastered {
  border-color: rgba(34,197,94,0.35);
}

/* Corner ribbon for mastered */
.concept-card .ribbon {
  position: absolute;
  top: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 32px 32px 0;
}

/* ═══════════════════════════════════════════════════════════
   STAT CARD (dashboard numbers)
═══════════════════════════════════════════════════════════ */
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px;
  flex: 1;
  min-width: 100px;
  text-align: center;
}

.stat-value {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--purple3);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 600;
}

/* ═══════════════════════════════════════════════════════════
   TOP NAV BAR (lesson screen)
═══════════════════════════════════════════════════════════ */
.lesson-nav {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-sm);
}

/* ═══════════════════════════════════════════════════════════
   STEP EXAMPLE (worked example steps)
═══════════════════════════════════════════════════════════ */
.step-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 10px;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.step-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  margin-top: 1px;
}

.step-text {
  font-size: 0.98rem;
  line-height: 1.65;
  padding-top: 4px;
}

/* ═══════════════════════════════════════════════════════════
   BACKGROUND DECORATION (starfield)
═══════════════════════════════════════════════════════════ */
.star {
  position: fixed;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  z-index: 0;
  animation: pulse 3s ease-in-out infinite;
}

/* ═══════════════════════════════════════════════════════════
   CONFETTI (celebration)
═══════════════════════════════════════════════════════════ */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 100;
  animation: confettiFall linear forwards;
}

/* ═══════════════════════════════════════════════════════════
   NUMBER LINE VISUAL (interactive element)
═══════════════════════════════════════════════════════════ */
.numline-wrap {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 20px 16px;
  overflow-x: auto;
}

.numline-track {
  display: flex;
  align-items: flex-end;
  gap: 0;
  position: relative;
  height: 64px;
  min-width: 320px;
}

.numline-line {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border2);
  transform: translateY(-50%);
}

.numline-tick {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
  z-index: 1;
}

.numline-tick-mark {
  width: 2px;
  height: 10px;
  background: var(--border2);
}

.numline-tick-mark.zero {
  height: 16px;
  width: 3px;
  background: var(--amber);
}

.numline-label {
  font-size: 0.72rem;
  font-weight: 700;
  margin-top: 4px;
  color: var(--muted);
}

.numline-label.zero      { color: var(--amber); }
.numline-label.positive  { color: var(--green2); }
.numline-label.negative  { color: var(--coral2); }

/* ═══════════════════════════════════════════════════════════
   TOKEN MODEL VISUAL
═══════════════════════════════════════════════════════════ */
.token {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 0.75rem;
  font-weight: 800;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.token-blue { background: var(--blue); }
.token-red  { background: var(--coral); }
.token-grey { background: var(--faint); }

/* ═══════════════════════════════════════════════════════════
   SCROLLBAR STYLING
═══════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════ */
@media (max-width: 600px) {
  .page-wrap { padding: 16px 14px; }
  .btn-lg    { padding: 13px 28px; font-size: 0.98rem; }
  .fredoka   { letter-spacing: 0px; }
  .concept-card { padding: 12px; }
  .card { padding: 18px; }
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP (hover)
═══════════════════════════════════════════════════════════ */
.tooltip-wrap { position: relative; }

.tooltip-wrap:hover .tooltip-box {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.tooltip-box {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 12px;
  border-radius: var(--r-sm);
  font-size: 0.78rem;
  white-space: nowrap;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--t-fast), transform var(--t-fast);
}

/* ═══════════════════════════════════════════════════════════
   UTILITY SEPARATORS
═══════════════════════════════════════════════════════════ */
.divider {
  height: 1px;
  background: var(--border);
  margin: var(--gap-md) 0;
}

.spacer-sm { height: var(--gap-sm); }
.spacer-md { height: var(--gap-md); }
.spacer-lg { height: var(--gap-lg); }

  explain: `The ABSOLUTE VALUE of a number is its distance from zero on the number line, regardless of direction.

Examples:

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BKT PARAMETERS
   One set of 4 parameters per Knowledge Component (KC).
   P(L0) = prior probability of knowing KC before any practice
   P(T)  = learning rate — probability of learning on each attempt
   P(S)  = slip rate — P(wrong | knows KC)
   P(G)  = guess rate — P(correct | does not know KC)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const BKT_PARAMS = {
  K1: { L0: 0.20, T: 0.30, S: 0.10, G: 0.25 }, /* Negative number concept  */
  K2: { L0: 0.15, T: 0.28, S: 0.10, G: 0.25 }, /* Number line & plotting   */
  K3: { L0: 0.15, T: 0.25, S: 0.10, G: 0.25 }, /* Absolute value           */
  K4: { L0: 0.15, T: 0.28, S: 0.08, G: 0.25 }, /* Ordering & comparing     */
  K5: { L0: 0.10, T: 0.25, S: 0.10, G: 0.25 }, /* Same-sign addition       */
  K6: { L0: 0.10, T: 0.22, S: 0.10, G: 0.25 }, /* Opposite-sign addition   */
  K7: { L0: 0.10, T: 0.25, S: 0.08, G: 0.25 }, /* Additive inverse         */
  K8: { L0: 0.08, T: 0.20, S: 0.10, G: 0.25 }, /* Subtraction rules        */
  K9: { L0: 0.08, T: 0.20, S: 0.10, G: 0.25 }, /* Real-world application   */
};

const KC_LABELS = {
  K1: "Negative Numbers",
  K2: "Number Line",
  K3: "Absolute Value",
  K4: "Ordering",
  K5: "Same-Sign Add",
  K6: "Opp-Sign Add",
  K7: "Additive Inverse",
  K8: "Subtraction",
  K9: "Real-World",
};

/* Thresholds */
const MASTERY_THRESHOLD = 0.95;   /* P(L) ≥ this → KC mastered          */
const UNLOCK_THRESHOLD  = 0.50;   /* P(L) ≥ this → unlock next concept  */
const REMEDIATE_THRESHOLD = 0.35; /* P(L) ≤ this after a question → suggest remediation */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BKT ENGINE FUNCTIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/**
 * bktUpdate — run one Bayesian update step.
 *
 * Returns the new posterior P(L_n) after the learner's response,
 * then applies the learning transition P(T).
 *
 * @param {number} priorL   — current P(L_{n-1})
 * @param {boolean} correct — did the learner answer correctly?
 * @param {object} p        — BKT_PARAMS entry for this KC
 * @returns {number}         — new P(L_n) in [0, 1]
 */
function bktUpdate(priorL, correct, p) {
  /* Step 1 — compute P(evidence | L) and P(evidence | ¬L) */
  const pEgivenL    = correct ? (1 - p.S) : p.S;
  const pEgivenNotL = correct ? p.G       : (1 - p.G);

  /* Step 2 — Bayes update (posterior probability of knowing) */
  const numerator   = priorL * pEgivenL;
  const denominator = numerator + (1 - priorL) * pEgivenNotL;
  const posterior   = denominator > 0 ? numerator / denominator : priorL;

  /* Step 3 — apply learning transition */
  const newL = posterior + (1 - posterior) * p.T;

  /* Clamp to [0, 0.999] — never reach exactly 1 in BKT */
  return Math.min(Math.max(newL, 0), 0.999);
}

/**
 * selectTier — choose question difficulty based on current P(L).
 * Returns 1 (basic), 2 (intermediate), or 3 (advanced).
 */
function selectTier(pL) {
  if (pL < 0.40) return 1;
  if (pL < 0.72) return 2;
  return 3;
}

/**
 * bestQuestionIndex — pick the question from a concept's question array
 * whose tier best matches the current P(L).
 * Falls back to the closest available tier if exact match not found.
 */
function bestQuestionIndex(questions, pL) {
  const targetTier = selectTier(pL);
  /* Try to find a question at the target tier */
  let idx = questions.findIndex(q => q.tier === targetTier);
  if (idx !== -1) return idx;
  /* Fall back: find closest tier */
  let best = 0;
  let bestDiff = Infinity;
  questions.forEach((q, i) => {
    const diff = Math.abs(q.tier - targetTier);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  });
  return best;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PROGRESS STATUS HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/**
 * initBKTState — create initial BKT posteriors from L0 priors.
 */
function initBKTState() {
  const state = {};
  Object.keys(BKT_PARAMS).forEach(k => {
    state[k] = BKT_PARAMS[k].L0;
  });
  return state;
}

/**
 * initProgress — set C1a as 'available', all others 'locked'.
 * Status values: 'locked' | 'available' | 'in_progress' | 'mastered'
 */
function initProgress() {
  const prog = {};
  CONCEPT_ORDER.forEach((id, i) => {
    prog[id] = i === 0 ? 'available' : 'locked';
  });
  return prog;
}

/**
 * computeProgressStatus — derive progress status from BKT posterior.
 * Used after every answer to update the progress map.
 */
function computeProgressStatus(pL, current) {
  if (current === 'mastered') return 'mastered'; /* never downgrade mastered */
  if (pL >= MASTERY_THRESHOLD) return 'mastered';
  if (pL >= UNLOCK_THRESHOLD)  return 'in_progress';
  if (current === 'in_progress') return 'in_progress'; /* never downgrade */
  return 'available';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATE PERSISTENCE (localStorage)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const STORAGE_KEY = 'integer_adventures_v2';

function loadPersistedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    /* Basic validation — check expected keys exist */
    if (!parsed.bkt || !parsed.progress || !parsed.name) return null;
    return parsed;
  } catch {
    return null;
  }
}

function persistState(state) {
  try {
    /* Only persist the fields that should survive a refresh */
    const toSave = {
      name:           state.name,
      bkt:            state.bkt,
      progress:       state.progress,
      streak:         state.streak,
      totalAnswered:  state.totalAnswered,
      totalCorrect:   state.totalCorrect,
      responselog:    state.responselog,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch {
    /* localStorage unavailable — silently continue */
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INITIAL STATE FACTORY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function makeInitialState() {
  const saved = loadPersistedState();
  return {
    /* ── Navigation ──────────────────────────────── */
    screen:      saved ? 'map' : 'welcome', /* 'welcome' | 'map' | 'lesson' */

    /* ── Learner identity ─────────────────────────── */
    name:        saved?.name       ?? '',

    /* ── BKT posteriors (one float per KC) ──────── */
    bkt:         saved?.bkt        ?? initBKTState(),

    /* ── Concept progress map ────────────────────── */
    progress:    saved?.progress   ?? initProgress(),

    /* ── Session statistics ───────────────────────── */
    streak:        saved?.streak        ?? 0,
    totalAnswered: saved?.totalAnswered ?? 0,
    totalCorrect:  saved?.totalCorrect  ?? 0,

    /* ── Response log (for learner model analytics) ─ */
    responselog:  saved?.responselog  ?? [],   /* [{cid,qid,tier,correct,hintsUsed,ts}] */

    /* ── Active lesson state (not persisted) ─────── */
    conceptId:   null,    /* id of the concept currently being taught */
    phase:       'story', /* 'story'|'explain'|'example'|'tryit'|'question'|'celebrate'|'remediate' */
    qIndex:      0,       /* which question in c.questions[] is active */
    hintsShown:  0,       /* 0–4: how many hint levels have been revealed */
    selectedOpt: null,    /* the option string the learner clicked       */
    answered:    false,   /* has the learner submitted this question?    */
    wasCorrect:  null,    /* true | false | null                         */
    showTryitAns: false,  /* whether tryit answer has been revealed      */
    showExStep:  0,       /* which example step has been revealed (0-indexed) */
  };
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REDUCER — pure function, no side effects
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function reducer(state, action) {
  switch (action.type) {

    /* ── Learner enters their name and starts ──────── */
    case 'SET_NAME': {
      return { ...state, name: action.name, screen: 'map' };
    }

    /* ── Open a concept from the map ─────────────── */
    case 'START_CONCEPT': {
      const prog = state.progress[action.id];
      if (prog === 'locked') return state; /* guard: locked concepts are unclickable */
      const concept = CONCEPTS[action.id];
      const pL      = state.bkt[concept.kcId];
      return {
        ...state,
        screen:      'lesson',
        conceptId:   action.id,
        phase:       'story',
        qIndex:      bestQuestionIndex(concept.questions, pL),
        hintsShown:  0,
        selectedOpt: null,
        answered:    false,
        wasCorrect:  null,
        showTryitAns: false,
        showExStep:  0,
      };
    }

    /* ── Navigate between lesson phases ───────────── */
    case 'SET_PHASE': {
      return {
        ...state,
        phase:       action.phase,
        hintsShown:  0,
        selectedOpt: null,
        answered:    false,
        wasCorrect:  null,
      };
    }

    /* ── Advance the worked example step-by-step ──── */
    case 'NEXT_EX_STEP': {
      const concept = CONCEPTS[state.conceptId];
      const maxStep = concept.example.steps.length - 1;
      return { ...state, showExStep: Math.min(state.showExStep + 1, maxStep) };
    }

    case 'RESET_EX_STEP': {
      return { ...state, showExStep: 0 };
    }

    /* ── Reveal the try-it answer ──────────────────── */
    case 'REVEAL_TRYIT': {
      return { ...state, showTryitAns: true };
    }

    /* ── Learner selects an MCQ option ─────────────── */
    case 'SELECT_OPTION': {
      if (state.answered) return state; /* ignore after submit */
      return { ...state, selectedOpt: action.opt };
    }

    /* ── Learner submits their answer ─────────────── */
    case 'SUBMIT_ANSWER': {
      if (!state.selectedOpt || state.answered) return state;

      const concept  = CONCEPTS[state.conceptId];
      const question = concept.questions[state.qIndex];
      const correct  = state.selectedOpt === question.ans;
      const kcId     = concept.kcId;
      const params   = BKT_PARAMS[kcId];

      /* BKT update */
      const oldPL = state.bkt[kcId];
      const newPL = bktUpdate(oldPL, correct, params);

      /* Update BKT state */
      const newBKT = { ...state.bkt, [kcId]: newPL };

      /* Update progress for this concept */
      const ci         = CONCEPT_ORDER.indexOf(state.conceptId);
      const newProg    = { ...state.progress };
      const newStatus  = computeProgressStatus(newPL, newProg[state.conceptId]);
      newProg[state.conceptId] = newStatus;

      /* Unlock the next concept if P(L) crossed the unlock threshold */
      if (newPL >= UNLOCK_THRESHOLD && ci + 1 < CONCEPT_ORDER.length) {
        const nextId = CONCEPT_ORDER[ci + 1];
        if (newProg[nextId] === 'locked') {
          newProg[nextId] = 'available';
        }
      }

      /* Streak */
      const newStreak = correct ? state.streak + 1 : 0;

      /* Response log entry */
      const logEntry = {
        cid:       state.conceptId,
        qid:       question.id,
        kcId,
        tier:      question.tier,
        correct,
        hintsUsed: state.hintsShown,
        pLbefore:  oldPL,
        pLafter:   newPL,
        ts:        Date.now(),
      };

      return {
        ...state,
        answered:     true,
        wasCorrect:   correct,
        streak:       newStreak,
        totalAnswered: state.totalAnswered + 1,
        totalCorrect:  state.totalCorrect + (correct ? 1 : 0),
        bkt:          newBKT,
        progress:     newProg,
        responselog:  [...state.responselog.slice(-99), logEntry], /* keep last 100 */
      };
    }

    /* ── Show next hint level ──────────────────────── */
    case 'SHOW_HINT': {
      const concept   = CONCEPTS[state.conceptId];
      const question  = concept.questions[state.qIndex];
      const maxHints  = question.hints.length;
      return { ...state, hintsShown: Math.min(state.hintsShown + 1, maxHints) };
    }

    /* ── After answer: proceed to next question or end ─ */
    case 'NEXT_QUESTION': {
      const concept   = CONCEPTS[state.conceptId];
      const pL        = state.bkt[concept.kcId];
      const mastered  = pL >= MASTERY_THRESHOLD;
      const lastQ     = state.qIndex >= concept.questions.length - 1;
      const needRemed = pL <= REMEDIATE_THRESHOLD && state.hintsShown >= 3;

      if (mastered) {
        /* Celebrate mastery */
        return { ...state, phase: 'celebrate', answered: false, selectedOpt: null };
      }
      if (needRemed && !lastQ) {
        /* Trigger remediation before continuing */
        return { ...state, phase: 'remediate', answered: false, selectedOpt: null };
      }
      if (lastQ) {
        /* All questions done — celebrate regardless */
        return { ...state, phase: 'celebrate', answered: false, selectedOpt: null };
      }

      /* Move to next question, picking tier based on updated P(L) */
      const nextIdx = state.qIndex + 1 < concept.questions.length
        ? state.qIndex + 1
        : state.qIndex;

      return {
        ...state,
        phase:       'question',
        qIndex:      nextIdx,
        hintsShown:  0,
        selectedOpt: null,
        answered:    false,
        wasCorrect:  null,
      };
    }

    /* ── After remediation: restart questions at tier 1 ─ */
    case 'AFTER_REMEDIATION': {
      const concept = CONCEPTS[state.conceptId];
      /* Find the tier-1 question to re-attempt after remediation */
      const t1Idx = concept.questions.findIndex(q => q.tier === 1);
      return {
        ...state,
        phase:       'question',
        qIndex:      t1Idx !== -1 ? t1Idx : 0,
        hintsShown:  0,
        selectedOpt: null,
        answered:    false,
        wasCorrect:  null,
      };
    }

    /* ── Return to the concept map ─────────────────── */
    case 'GO_MAP': {
      return {
        ...state,
        screen:    'map',
        conceptId: null,
        phase:     'story',
      };
    }

    /* ── Reset all progress (fresh start) ─────────── */
    case 'RESET_ALL': {
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      return {
        ...makeInitialState(),
        name:   state.name,  /* keep the name */
        screen: 'map',
      };
    }

    default:
      return state;
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* Colour for each subtopic — used for borders, accents, pills */
const ST_COLORS = {
  ST1: "#14B8A6",
  ST2: "#3B82F6",
  ST3: "#F59E0B",
  ST4: "#22C55E",
  ST5: "#F87171",
};

/* Return the subtopic colour for a given concept ID */
function stColor(conceptId) {
  const c = CONCEPTS[conceptId];
  return ST_COLORS[c.stId] || "#A78BFA";
}

/* Progress status display config */
const PROG_CONFIG = {
  locked:      { icon: "🔒", label: "Locked",      color: "#3B4A6B" },
  available:   { icon: "📖", label: "Not started", color: "#7A8FAF" },
  in_progress: { icon: "✏️", label: "In progress", color: "#F59E0B" },
  mastered:    { icon: "🏆", label: "Mastered",    color: "#22C55E" },
};

/* Tier label strings */
const TIER_LABELS = {
  1: "⭐ Basic",
  2: "⭐⭐ Intermediate",
  3: "⭐⭐⭐ Advanced",
};

/* Hint level colours */
const HINT_COLORS = ["#14B8A6", "#F59E0B", "#A78BFA", "#F87171"];

/* Format a P(L) float as a percentage string */
function pct(v) {
  return Math.round(v * 100) + "%";
}

/* Derive BKT bar colour from P(L) value */
function bktColor(pL) {
  if (pL >= MASTERY_THRESHOLD) return "#22C55E"; /* green  — mastered */
  if (pL >= 0.65)              return "#F59E0B"; /* amber  — progressing */
  return "#6366F1";                              /* purple — early stage */
}

/* Overall chapter completion percentage */
function chapterPct(progress) {
  const mastered = Object.values(progress).filter(v => v === 'mastered').length;
  return Math.round((mastered / CONCEPT_ORDER.length) * 100);
}

/* Encouraging message based on streak */
function streakMessage(streak) {
  if (streak >= 5) return "🔥 On fire! " + streak + " in a row!";
  if (streak >= 3) return "⚡ Great streak! " + streak + " correct!";
  if (streak >= 2) return "✨ Nice! " + streak + " in a row!";
  return null;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFETTI HELPER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CONFETTI_COLORS = [
  "#6366F1","#22C55E","#F59E0B","#F87171",
  "#14B8A6","#A78BFA","#EC4899","#FBBF24",
];

function generateConfetti(count = 28) {
  return Array.from({ length: count }, (_, i) => ({
    id: i,
    color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
    left:  `${5 + Math.random() * 90}%`,
    top:   `${-10 + Math.random() * 20}px`,
    size:  `${7 + Math.random() * 8}px`,
    delay: `${Math.random() * 0.8}s`,
    dur:   `${1.8 + Math.random() * 1.2}s`,
    rot:   `${Math.random() * 360}deg`,
  }));
}

const STARS = Array.from({ length: 36 }, (_, i) => ({
  id: i,
  size: 1.5 + (i * 17 % 3),
  left: `${(i * 47 + 13) % 97}%`,

}));

function StarField() {
  return (
    <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:0, overflow:'hidden' }}>
      {STARS.map(s => (
        <div key={s.id} className="star" style={{
          width: s.size+'px', height: s.size+'px',
          left: s.left, top: s.top, opacity: s.opacity,
          animationDuration: s.dur, animationDelay: s.delay,
        }}/>
      ))}
    </div>
  );
}

function BktBar({ pL, width='100%', height=5 }) {
  return (
    <div style={{ width, height, background:'#0A0F1E', borderRadius:4, overflow:'hidden' }}>
      <div style={{
        height:'100%', width: pct(pL), background: bktColor(pL),
        borderRadius:4, transition:'width 0.7s cubic-bezier(0.34,1.2,0.64,1)',
      }}/>
    </div>
  );
}

function Pill({ children, color='#6366F1', bg, style={} }) {
  return (
    <span className="pill" style={{
      background: bg || color+'22', color,
      border: `1px solid ${color}44`, ...style,
    }}>
      {children}
    </span>
  );
}

            return (
              <div key={p.id} className={`phase-dot${isDone?' done':isCurrent?' current':' locked'}`}
                style={{ borderColor: isCurrent ? color : undefined }} title={p.label}>
                {isDone ? '✓' : p.icon}
              </div>
            );
          })}
        </div>

        {/* P(L) chip */}
        <div style={{ display:'flex', alignItems:'center', gap:6, background:'var(--card2)', borderRadius:20, padding:'4px 10px', border:'1px solid var(--border)' }}>
          <BktBar pL={pL} width={44} height={5}/>
          <span style={{ fontSize:'0.75rem', fontWeight:800, color: bktColor(pL) }}>{pct(pL)}</span>
        </div>
      </div>

      {/* Phase content */}
      <div style={{ flex:1, padding:'20px', maxWidth:700, margin:'0 auto', width:'100%' }}>
        {state.phase === 'story'    && <StoryPanel   c={c} color={color} dispatch={dispatch}/>}
        {state.phase === 'explain'  && <ExplainPanel c={c} color={color} dispatch={dispatch}/>}
        {state.phase === 'example'  && <ExamplePanel c={c} color={color} state={state} dispatch={dispatch}/>}
        {state.phase === 'tryit'    && <TryItPanel   c={c} color={color} state={state} dispatch={dispatch}/>}
        {/* Panels below are defined in Part 6 */}
        {state.phase === 'question'  && <QuestionPanel  c={c} color={color} state={state} dispatch={dispatch}/>}
        {state.phase === 'celebrate' && <CelebrationPanel c={c} color={color} state={state} dispatch={dispatch}/>}
        {state.phase === 'remediate' && <RemediationPanel c={c} color={color} state={state} dispatch={dispatch}/>}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STORY PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function StoryPanel({ c, color, dispatch }) {
  const paragraphs = c.story.split('\n\n').filter(Boolean);
  return (
    <div className="anim-fadeup">
      <div style={{
        background:`linear-gradient(135deg,${color}14,${color}07)`,
        border:`1.5px solid ${color}35`, borderRadius:20, padding:28, marginBottom:20,
        position:'relative', overflow:'hidden',
      }}>
        <div style={{ position:'absolute', top:14, right:18, fontSize:'4rem', opacity:0.09, userSelect:'none', pointerEvents:'none' }}>
          {c.emoji}
        </div>
        <Pill color={color} style={{ marginBottom:14 }}>📖 Story</Pill>
        <h2 className="fredoka" style={{ fontSize:'1.55rem', color:'var(--text)', marginBottom:14, lineHeight:1.2 }}>
          {c.title}
        </h2>
        {paragraphs.map((para, i) => (
          <p key={i} style={{ color:'var(--text2)', fontSize:'1rem', lineHeight:1.85, marginBottom: i < paragraphs.length-1 ? 12 : 0 }}>
            {para}
          </p>
        ))}
      </div>
      <button className="btn btn-primary" onClick={() => dispatch({ type:'SET_PHASE', phase:'explain' })}>
        I'm curious! Let's learn →
      </button>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EXPLAIN PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function ExplainPanel({ c, color, dispatch }) {
  /* Split on blank lines; detect indented blocks as formula boxes */
  const sections = c.explain.split('\n\n').filter(Boolean);

  return (
    <div className="anim-fadeup">
      <div className="card" style={{ border:`1.5px solid ${color}30`, marginBottom:20 }}>
        <Pill color={color} style={{ marginBottom:14 }}>💡 Explanation</Pill>
        <h2 style={{ fontSize:'1.2rem', fontWeight:800, color:'var(--text)', marginBottom:16 }}>{c.title}</h2>

        {sections.map((sec, i) => {
          const lines     = sec.split('\n');
          const isBlock   = lines.every(l => l.startsWith('  ') || l.startsWith('\t') || l === '');
          const firstLine = lines[0];
          const isHeading = firstLine === firstLine.toUpperCase() && firstLine.trim().length > 0 && firstLine.trim().length < 55 && lines.length > 1;

          if (isBlock) {
            return (
              <div key={i} className="card-inset" style={{ marginBottom:14, fontFamily:'monospace', fontSize:'0.87rem', lineHeight:1.85, color:'var(--text2)', whiteSpace:'pre-wrap' }}>
                {sec.replace(/^  /gm,'').replace(/^\t/gm,'')}
              </div>
            );
          }
          if (isHeading) {
            return (
              <div key={i} style={{ marginBottom:14 }}>
                <div style={{ fontSize:'0.78rem', fontWeight:800, color, letterSpacing:'0.8px', marginBottom:7, textTransform:'uppercase' }}>
                  {firstLine}
                </div>
                {lines.slice(1).map((line, j) => (
                  <p key={j} style={{ color:'var(--text2)', fontSize:'0.96rem', lineHeight:1.8, marginBottom: j < lines.length-2 ? 4 : 0 }}>
                    {line}
                  </p>
                ))}
              </div>
            );
          }
          return (
            <div key={i} style={{ marginBottom:14 }}>
              {lines.map((line, j) => (
                <p key={j} style={{ color:'var(--text2)', fontSize:'0.96rem', lineHeight:1.8, marginBottom: j < lines.length-1 ? 3 : 0 }}>
                  {line}
                </p>
              ))}
            </div>
          );
        })}
      </div>

      <div style={{ display:'flex', gap:10 }}>
        <button className="btn btn-ghost" onClick={() => dispatch({ type:'SET_PHASE', phase:'story' })}>← Story</button>
        <button className="btn btn-primary" onClick={() => dispatch({ type:'SET_PHASE', phase:'example' })}>
          Show me an example →
        </button>
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EXAMPLE PANEL  (step-by-step reveal)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function ExamplePanel({ c, color, state, dispatch }) {
  const { example }  = c;
  const currentStep  = state.showExStep;
  const totalSteps   = example.steps.length;
  const allRevealed  = currentStep >= totalSteps - 1;
  const [showAns, setShowAns] = useState(false);

  useEffect(() => { setShowAns(false); }, [c]);

  return (
    <div className="anim-fadeup">
      <div className="card" style={{ border:`1.5px solid ${color}30`, marginBottom:20 }}>
        <Pill color={color} style={{ marginBottom:14 }}>✏️ Worked Example</Pill>

        {/* Question */}
        <div className="card-inset" style={{ marginBottom:20 }}>
          <p style={{ fontWeight:700, fontSize:'0.97rem', color:'var(--text)', lineHeight:1.65 }}>{example.q}</p>
        </div>

        {/* Steps */}
        <div style={{ marginBottom:16 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
            <span style={{ fontSize:'0.85rem', fontWeight:700, color }}>Step-by-step</span>
            <span style={{ fontSize:'0.75rem', color:'var(--muted)' }}>{Math.min(currentStep+1,totalSteps)}/{totalSteps}</span>
          </div>

          {example.steps.map((step, i) => {
            const vis = i <= currentStep;
            return (
              <div key={i} className="step-row" style={{ opacity: vis?1:0.15, transform: vis?'none':'translateY(6px)' }}>
                <div className="step-num" style={{ background: vis ? color : 'var(--border)' }}>{i+1}</div>
                <p className="step-text" style={{ color: vis?'var(--text2)':'var(--faint)' }}>{step}</p>
              </div>
            );
          })}

          <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
            {!allRevealed && (
              <button className="btn btn-sm" style={{ background:color, color:'#fff' }}
                onClick={() => dispatch({ type:'NEXT_EX_STEP' })}>Next step →</button>
            )}
            {allRevealed && !showAns && (
              <button className="btn btn-green btn-sm" onClick={() => setShowAns(true)}>Show answer ✓</button>
            )}
            {currentStep > 0 && (
              <button className="btn btn-ghost btn-sm"
                onClick={() => { dispatch({ type:'RESET_EX_STEP' }); setShowAns(false); }}>↺ Restart</button>
            )}
          </div>
        </div>

        {/* Answer */}
        {showAns && (
          <div className="anim-popin" style={{
            background:`${color}14`, border:`1.5px solid ${color}55`,
            borderRadius:12, padding:'14px 16px', display:'flex', alignItems:'flex-start', gap:12,
          }}>
            <span style={{ fontSize:'1.4rem', lineHeight:1 }}>✅</span>
            <div>
              <div style={{ fontSize:'0.78rem', fontWeight:700, color, marginBottom:4 }}>Answer</div>
              <div style={{ fontSize:'0.95rem', fontWeight:700, color:'var(--text)' }}>{example.answer}</div>
            </div>
          </div>
        )}
      </div>

      <div style={{ display:'flex', gap:10 }}>
        <button className="btn btn-ghost" onClick={() => dispatch({ type:'SET_PHASE', phase:'explain' })}>← Explanation</button>
        {showAns && (
          <button className="btn btn-primary" onClick={() => dispatch({ type:'SET_PHASE', phase:'tryit' })}>
            My turn to try! 🎯
          </button>
        )}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TRY-IT PANEL  (ungraded guided practice)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function TryItPanel({ c, color, state, dispatch }) {
  const { tryit }  = c;
  const revealed   = state.showTryitAns;

  return (
    <div className="anim-fadeup">
      <div className="card" style={{ border:`1.5px solid ${color}30`, marginBottom:20 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
          <Pill color={color}>🎯 Try It!</Pill>
          <span style={{ fontSize:'0.78rem', color:'var(--muted)' }}>Practice — not graded</span>
        </div>

        <div className="card-inset" style={{ marginBottom:14 }}>
          <p style={{ fontWeight:700, fontSize:'0.97rem', color:'var(--text)', lineHeight:1.65 }}>{tryit.q}</p>
        </div>

        <div style={{
          display:'flex', gap:10, alignItems:'flex-start',
          background:'rgba(245,158,11,0.07)', border:'1px solid rgba(245,158,11,0.25)',
          borderRadius:10, padding:'10px 14px', marginBottom:16,
        }}>
          <span style={{ fontSize:'1.1rem' }}>💭</span>
          <p style={{ fontSize:'0.88rem', color:'var(--muted)', lineHeight:1.6 }}>
            Try to work it out yourself first — on paper or in your head — then reveal!
          </p>
        </div>

        {!revealed ? (
          <button className="btn btn-amber" onClick={() => dispatch({ type:'REVEAL_TRYIT' })}>
            Reveal answer
          </button>
        ) : (
          <div className="anim-fadeup">
            <div className="card-correct" style={{ marginBottom:12 }}>
              <div style={{ fontSize:'0.78rem', fontWeight:700, color:'var(--green2)', marginBottom:5 }}>✅ Answer</div>
              <div style={{ fontSize:'1rem', fontWeight:800, color:'var(--text)' }}>{tryit.ans}</div>
            </div>
            <div className="card-sm">
              <div style={{ fontSize:'0.78rem', fontWeight:700, color:'var(--purple3)', marginBottom:5 }}>💡 How it works</div>
              <p style={{ fontSize:'0.9rem', color:'var(--text2)', lineHeight:1.7 }}>{tryit.why}</p>
            </div>
          </div>
        )}
      </div>

      <div style={{ display:'flex', gap:10 }}>
        <button className="btn btn-ghost" onClick={() => dispatch({ type:'SET_PHASE', phase:'example' })}>← Example</button>
        {revealed && (
          <button className="btn btn-primary" onClick={() => dispatch({ type:'SET_PHASE', phase:'question' })}>
            Ready for questions! 🧠
          </button>
        )}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HINT PANEL  (shown inside QuestionPanel)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function HintPanel({ hints, hintsShown, onShowHint, answered }) {
  if (answered) return null;

  const maxHints = hints.length;
  const allUsed  = hintsShown >= maxHints;

  return (
    <div style={{ marginTop: '16px' }}>
      {/* Hint dots progress */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px' }}>
        <span style={{ fontSize: '0.8rem', color: '#7A8FAF', fontWeight: 700 }}>
          Hints:
        </span>
        <div className="hint-dots">
          {Array.from({ length: maxHints }).map((_, i) => (
            <div key={i} className={`hint-dot ${i < hintsShown ? 'active' : ''}`} />
          ))}
        </div>
        {hintsShown > 0 && (
          <span style={{ fontSize: '0.75rem', color: '#7A8FAF' }}>
            {hintsShown}/{maxHints} used
          </span>
        )}
      </div>

      {/* Revealed hint rows */}
      {hintsShown > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '7px', marginBottom: '10px' }}>
          {hints.slice(0, hintsShown).map((hint, i) => (
            <div key={i} className="hint-row anim-fadeup">
              <div className={`hint-number hint-${i + 1}`}>{i + 1}</div>
              <p style={{ color: '#C0D0EF', fontSize: '0.9rem', lineHeight: 1.6, margin: 0 }}>
                {hint}
              </p>
            </div>
          ))}
        </div>
      )}

      {/* Show hint button */}
      {!allUsed && (
        <button className="btn btn-ghost btn-sm"
          onClick={onShowHint}
          style={{ fontSize: '0.82rem' }}>
          💡 {hintsShown === 0 ? 'Get a hint' : 'Next hint'}
          {hintsShown >= 2 && (
            <span style={{ color: '#F87171', marginLeft: '4px', fontSize: '0.75rem' }}>
              (hint {hintsShown + 1} of {maxHints})
            </span>
          )}
        </button>
      )}

      {/* All hints used — nudge to try */}
      {allUsed && (
        <p style={{ fontSize: '0.82rem', color: '#F59E0B', fontStyle: 'italic', marginTop: '4px' }}>
          All hints shown — look at hint 4 carefully, then pick your answer!
        </p>
      )}
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   QUESTION PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function QuestionPanel({ c, color, state, dispatch }) {
  const q         = c.questions[state.qIndex];
  const { answered, wasCorrect, hintsShown, selectedOpt } = state;
  const pL        = state.bkt[c.kcId];

  /* Determine option visual state */
  function optClass(opt) {
    if (!answered) return selectedOpt === opt ? 'selected' : '';
    if (opt === q.ans) return 'correct';
    if (opt === selectedOpt) return 'wrong';
    return '';
  }

  function optStyle(opt) {
    const cls = optClass(opt);
    if (cls === 'correct') return { borderColor: '#22C55E', background: 'rgba(34,197,94,0.10)', color: '#4ADE80' };
    if (cls === 'wrong')   return { borderColor: '#F87171', background: 'rgba(248,113,113,0.10)', color: '#FCA5A5' };
    if (cls === 'selected') return { borderColor: color, background: color + '18', color: '#F0F4FF' };
    return {};
  }

  return (
    <div className="anim-fadeup">

      {/* ── Question header row ── */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap', marginBottom: '14px' }}>
        <div className="pill" style={{ background: '#1A2235', color: '#A78BFA', border: '1px solid #2A3A55' }}>
          ❓ Q{state.qIndex + 1} of {c.questions.length}
        </div>
        <div className="tier-badge">{TIER_LABELS[q.tier]}</div>

        {/* Live BKT readout */}
        <div style={{
          marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '7px',
          background: '#1A2235', borderRadius: '20px', padding: '4px 12px',
          border: '1px solid #2A3A55',
        }}>
          <span style={{ fontSize: '0.72rem', color: '#7A8FAF' }}>Mastery:</span>
          <div style={{ width: 55, height: 5, background: '#2A3A55', borderRadius: '3px', overflow: 'hidden' }}>
            <div style={{
              height: '100%', width: pct(pL),
              background: bktColor(pL),
              borderRadius: '3px', transition: 'width 0.6s ease',
            }} />
          </div>
          <span style={{ fontSize: '0.75rem', fontWeight: 900, color: '#F0F4FF' }}>{pct(pL)}</span>
        </div>
      </div>

      {/* ── Question card ── */}
      <div className="card" style={{ border: `1.5px solid ${color}35`, marginBottom: '1rem' }}>

        {/* Question text */}
        <p style={{
          fontSize: '1.05rem', fontWeight: 700, color: '#F0F4FF',
          lineHeight: 1.7, marginBottom: '18px',
        }}>
          {q.q}
        </p>

        {/* MCQ options */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: '9px' }}>
          {q.opts.map(opt => (
            <button
              key={opt}
              className={`option-btn ${answered ? 'answered' : ''}`}
              style={optStyle(opt)}
              onClick={() => !answered && dispatch({ type: 'SELECT_OPTION', opt })}
            >
              {/* Radio circle */}
              <div className={`option-radio`}
                style={
                  optClass(opt) === 'selected' ? { borderColor: color, background: color } :
                  optClass(opt) === 'correct'  ? { borderColor: '#22C55E', background: '#22C55E' } :
                  optClass(opt) === 'wrong'    ? { borderColor: '#F87171', background: '#F87171' } :
                  {}
                }
              >
                {(optClass(opt) === 'selected' || optClass(opt) === 'correct' || optClass(opt) === 'wrong') && (
                  <div className="option-radio-dot" />
                )}
              </div>

              <span style={{ flex: 1, textAlign: 'left' }}>{opt}</span>

              {/* Result icons */}
              {answered && opt === q.ans     && <span style={{ fontSize: '1.1rem', flexShrink: 0 }}>✅</span>}
              {answered && opt === selectedOpt && opt !== q.ans && <span style={{ fontSize: '1.1rem', flexShrink: 0 }}>❌</span>}
            </button>
          ))}
        </div>

        {/* Hint panel (only shown before answering) */}
        <HintPanel
          hints={q.hints}
          hintsShown={hintsShown}
          answered={answered}
          onShowHint={() => dispatch({ type: 'SHOW_HINT' })}
        />

        {/* ── Submit button ── */}
        {!answered && (
          <div style={{ marginTop: '18px' }}>
            <button className="btn btn-primary"
              disabled={!selectedOpt}
              onClick={() => dispatch({ type: 'SUBMIT_ANSWER' })}>
              Check My Answer ✓
            </button>
          </div>
        )}

        {/* ── Post-answer feedback ── */}
        {answered && (
          <div className={`anim-popin ${wasCorrect ? 'card-correct' : 'card-wrong'}`}
            style={{ marginTop: '16px' }}>

            {/* Result header */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }}>
              <span style={{ fontSize: '1.5rem' }}>{wasCorrect ? '🎉' : '🤔'}</span>
              <span style={{
                fontWeight: 800, fontSize: '1rem',
                color: wasCorrect ? '#4ADE80' : '#FCA5A5',
              }}>
                {wasCorrect
                  ? (state.streak >= 3 ? `${state.streak} in a row! Excellent! 🔥` : 'Correct! Well done!')
                  : 'Not quite — here\'s why:'}
              </span>
            </div>

            {/* Explanation */}
            <p style={{ color: '#C0D0EF', fontSize: '0.92rem', lineHeight: 1.65, margin: 0 }}>
              {q.explain}
            </p>

            {/* BKT update notification */}
            <div style={{
              marginTop: '10px', padding: '6px 10px',
              background: '#0D1526', borderRadius: '6px',
              fontSize: '0.75rem', color: '#7A8FAF', display: 'flex', gap: '6px', alignItems: 'center',
            }}>
              <span>🧠</span>
              <span>
                Mastery updated: {pct(pL)}
                {pL >= MASTERY_THRESHOLD && ' — KC mastered! 🏆'}
                {pL >= UNLOCK_THRESHOLD && pL < MASTERY_THRESHOLD && ' — next concept unlocked! 🔓'}
              </span>
            </div>
          </div>
        )}
      </div>

      {/* ── Next action button ── */}
      {answered && (
        <button className={`btn anim-fadeup ${wasCorrect ? 'btn-green' : 'btn-amber'}`}
          onClick={() => dispatch({ type: 'NEXT_QUESTION' })}>
          {wasCorrect ? 'Continue →' : 'See next question →'}
        </button>
      )}
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CELEBRATION PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function CelebrationPanel({ c, color, state, dispatch }) {
  const pL           = state.bkt[c.kcId];
  const mastered     = pL >= MASTERY_THRESHOLD;
  const ci           = CONCEPT_ORDER.indexOf(state.conceptId);
  const nextId       = ci + 1 < CONCEPT_ORDER.length ? CONCEPT_ORDER[ci + 1] : null;
  const nextConcept  = nextId ? CONCEPTS[nextId] : null;
  const nextUnlocked = nextId && state.progress[nextId] !== 'locked';
  const isLastInST   = !nextConcept || nextConcept.stId !== c.stId;

  /* Generate confetti once */
  const [confetti] = useState(() => generateConfetti(mastered ? 32 : 18));

  return (
    <div className="anim-fadeup" style={{ position: 'relative' }}>

      {/* Confetti burst */}
      {confetti.map(piece => (
        <div key={piece.id} className="confetti-piece" style={{
          left: piece.left, top: piece.top,
          width: piece.size, height: piece.size,
          background: piece.color,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
          animationDuration: piece.dur,
          animationDelay: piece.delay,
        }} />
      ))}

      {/* Main celebration card */}
      <div className="card" style={{
        border: `2px solid ${color}55`,
        textAlign: 'center',
        padding: '36px 28px',
        marginBottom: '1.5rem',
        background: `linear-gradient(160deg, ${color}12, ${color}05)`,
      }}>

        {/* Trophy / star */}
        <div style={{
          fontSize: mastered ? '4rem' : '3rem',
          marginBottom: '12px',
          animation: 'bounceSpin 0.8s cubic-bezier(0.34,1.56,0.64,1) both',
        }}>
          {mastered ? '🏆' : '⭐'}
        </div>

        <h2 className="fredoka" style={{
          fontSize: '1.9rem', color: '#F0F4FF',
          marginBottom: '8px', lineHeight: 1.2,
        }}>
          {mastered ? 'Concept Mastered!' : 'Section Complete!'}
        </h2>

        <p style={{ color: '#C0D0EF', fontSize: '1rem', lineHeight: 1.65, marginBottom: '20px' }}>
          {mastered
            ? `You have mastered "${c.title}"! Your knowledge tracker is now at ${pct(pL)} for this skill.`
            : `Great work on "${c.title}"! You're making solid progress. Keep practising to reach mastery!`}
        </p>

        {/* Stats row */}
        <div style={{
          display: 'flex', gap: '12px', justifyContent: 'center',
          flexWrap: 'wrap', marginBottom: '20px',
        }}>
          {[
            { label: 'Mastery',    value: pct(pL),                color: bktColor(pL) },
            { label: 'Streak',     value: `${state.streak} 🔥`,   color: '#F59E0B'    },
            { label: 'Accuracy',   value: state.totalAnswered
                ? Math.round(state.totalCorrect / state.totalAnswered * 100) + '%'
                : '—',                                             color: '#22C55E'    },
          ].map(s => (
            <div key={s.label} style={{
              background: '#111827', border: '1px solid #2A3A55',
              borderRadius: '12px', padding: '12px 20px', minWidth: '90px',
            }}>
              <div style={{ fontSize: '1.3rem', fontWeight: 900, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: '0.72rem', color: '#7A8FAF', marginTop: '2px' }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Next concept preview */}
        {nextConcept && nextUnlocked && (
          <div style={{
            background: '#1A2235', border: `1px solid ${color}33`,
            borderRadius: '12px', padding: '14px 16px', textAlign: 'left',
          }}>
            <div style={{ fontSize: '0.78rem', color: '#7A8FAF', fontWeight: 700, marginBottom: '6px' }}>
              {isLastInST ? '🎉 Subtopic complete! Up next:' : '🔓 Up next:'}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <span style={{ fontSize: '1.3rem' }}>{nextConcept.emoji}</span>
              <div>
                <div style={{ fontWeight: 700, color: '#F0F4FF', fontSize: '0.95rem' }}>
                  {nextConcept.title}
                </div>
                <div style={{ fontSize: '0.78rem', color: '#7A8FAF', marginTop: '2px' }}>
                  {SUBTOPICS.find(s => s.id === nextConcept.stId)?.title}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* All done! */}
        {!nextConcept && (
          <div style={{
            background: 'linear-gradient(135deg, rgba(99,102,241,0.2), rgba(167,139,250,0.1))',
            border: '1.5px solid #6366F188',
            borderRadius: '12px', padding: '16px',
          }}>
            <div style={{ fontSize: '2rem', marginBottom: '6px' }}>🎓</div>
            <div style={{ fontWeight: 800, color: '#A78BFA', fontSize: '1.05rem' }}>
              Chapter Complete!
            </div>
            <div style={{ color: '#7A8FAF', fontSize: '0.88rem', marginTop: '4px' }}>
              You have worked through all 18 concepts in the Integers chapter. Outstanding!
            </div>
          </div>
        )}
      </div>

      {/* Action buttons */}
      <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
        <button className="btn btn-ghost" onClick={() => dispatch({ type: 'GO_MAP' })}>
          ← Back to Map
        </button>
        {nextConcept && nextUnlocked && (
          <button className="btn btn-primary"
            onClick={() => dispatch({ type: 'START_CONCEPT', id: nextId })}>
            Next Concept: {nextConcept.title} →
          </button>
        )}
        {nextConcept && !nextUnlocked && (
          <button className="btn btn-amber" onClick={() => dispatch({ type: 'GO_MAP' })}>
            Practise more to unlock next concept 🔓
          </button>
        )}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REMEDIATION PANEL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function RemediationPanel({ c, color, state, dispatch }) {
  const rem          = c.remediation;
  const pL           = state.bkt[c.kcId];
  const [step, setStep] = useState('intro'); /* 'intro' | 'story' | 'question' | 'done' */
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const correct = selected === rem.q.ans;

  function handleSubmit() {
    if (!selected) return;
    setSubmitted(true);
    setStep('done');
  }

  return (
    <div className="anim-fadeup">

      {/* Header */}
      <div style={{
        background: 'rgba(248,113,113,0.08)',
        border: '1.5px solid rgba(248,113,113,0.30)',
        borderRadius: '14px', padding: '16px 20px', marginBottom: '16px',
        display: 'flex', alignItems: 'flex-start', gap: '12px',
      }}>
        <span style={{ fontSize: '1.8rem', flexShrink: 0 }}>🔍</span>
        <div>
          <div style={{ fontWeight: 800, color: '#FCA5A5', fontSize: '1rem', marginBottom: '4px' }}>
            Let's revisit this together!
          </div>
          <div style={{ color: '#7A8FAF', fontSize: '0.88rem', lineHeight: 1.5 }}>
            Your mastery tracker shows {pct(pL)} for this skill.
            A common sticking point here is: <em style={{ color: '#F0F4FF' }}>{rem.why}</em>.
          </div>
        </div>
      </div>

      {/* Re-teaching story */}
      {(step === 'intro' || step === 'story' || step === 'question' || step === 'done') && (
        <div className="card" style={{ border: '1.5px solid rgba(167,139,250,0.30)', marginBottom: '14px' }}>
          <div className="pill pill-purple" style={{ marginBottom: '12px' }}>
            💡 Re-teaching Story
          </div>
          {rem.story.split('\n\n').map((para, i) => (
            <p key={i} style={{
              color: '#C0D0EF', fontSize: '0.97rem', lineHeight: 1.8,
              marginBottom: '10px',
            }}>
              {para}
            </p>
          ))}
        </div>
      )}

      {/* Quick check question */}
      {(step === 'intro' || step === 'story' || step === 'question' || step === 'done') && (
        <div className="card" style={{ border: '1.5px solid #2A3A55', marginBottom: '14px' }}>
          <div className="pill pill-amber" style={{ marginBottom: '12px' }}>
            🎯 Quick Check
          </div>

          <p style={{ fontWeight: 700, color: '#F0F4FF', fontSize: '1rem', lineHeight: 1.6, marginBottom: '14px' }}>
            {rem.q.q}
          </p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '14px' }}>
            {rem.q.opts.map(opt => {
              let style = {};
              if (submitted) {
                if (opt === rem.q.ans)   style = { borderColor: '#22C55E', background: 'rgba(34,197,94,0.10)',   color: '#4ADE80' };
                if (opt === selected && opt !== rem.q.ans) style = { borderColor: '#F87171', background: 'rgba(248,113,113,0.10)', color: '#FCA5A5' };
              } else if (opt === selected) {
                style = { borderColor: '#A78BFA', background: 'rgba(167,139,250,0.12)', color: '#F0F4FF' };
              }

              return (
                <button key={opt}
                  className={`option-btn ${submitted ? 'answered' : ''}`}
                  style={style}
                  onClick={() => !submitted && setSelected(opt)}
                >
                  <div className="option-radio"
                    style={opt === selected ? { borderColor: '#A78BFA', background: '#A78BFA' } : {}}>
                    {opt === selected && <div className="option-radio-dot" />}
                  </div>
                  <span style={{ flex: 1, textAlign: 'left' }}>{opt}</span>
                  {submitted && opt === rem.q.ans && <span>✅</span>}
                  {submitted && opt === selected && opt !== rem.q.ans && <span>❌</span>}
                </button>
              );
            })}
          </div>

          {!submitted && (
            <button className="btn btn-primary btn-sm" disabled={!selected} onClick={handleSubmit}>
              Check Answer
            </button>
          )}

          {submitted && (
            <div className={`anim-popin ${correct ? 'card-correct' : 'card-wrong'}`}>
              <span style={{ fontWeight: 800, color: correct ? '#4ADE80' : '#FCA5A5' }}>
                {correct ? '✅ Correct — you\'ve got it!' : `❌ The correct answer is: "${rem.q.ans}"`}
              </span>
            </div>
          )}
        </div>
      )}

      {/* Continue buttons */}
      <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
        <button className="btn btn-ghost" onClick={() => dispatch({ type: 'GO_MAP' })}>
          ← Back to Map
        </button>
        {submitted && (
          <button className="btn btn-primary"
            onClick={() => dispatch({ type: 'AFTER_REMEDIATION' })}>
            Try the questions again →
          </button>
        )}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROOT APP COMPONENT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function App() {
  const [state, dispatch] = useReducer(reducer, null, makeInitialState);

  /* Persist state to localStorage after every update */
  useEffect(() => {
    persistState(state);
  }, [state]);

  /* Scroll to top whenever the screen or phase changes */
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [state.screen, state.phase, state.conceptId]);

  /* Route to the correct top-level screen */
  if (state.screen === 'welcome') {
    return <WelcomeScreen dispatch={dispatch} />;
  }

  if (state.screen === 'lesson' && state.conceptId) {
    return <LessonScreen state={state} dispatch={dispatch} />;
  }

  /* Default: map */
  return <MapScreen state={state} dispatch={dispatch} />;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOUNT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>

</html>
